<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafetería ULagos - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    background:
    linear-gradient(
        135deg,
        #003366 0%,
        #0056b3 50%,
        #eaf4ff 100%
    );

    overflow-x:hidden;
}

.login-container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-card{

    width:100%;
    max-width:450px;

    background:rgba(255,255,255,0.96);

    backdrop-filter:blur(10px);

    border:none;
    border-radius:25px;

    padding:40px;

    box-shadow:
    0 20px 40px rgba(0,0,0,0.15);

    animation:fadeIn .8s ease;
}

.ulises-img{

    width:140px;
    height:140px;

    object-fit:cover;

    border-radius:50%;

    border:5px solid #0d6efd;

    padding:4px;

    background:white;

    box-shadow:
    0 10px 25px rgba(13,110,253,.3);

    margin-bottom:20px;
}

.titulo{

    color:#004b9b;

    font-weight:800;

    margin-bottom:5px;
}

.subtitulo{

    color:#6c757d;

    font-size:0.95rem;

    margin-bottom:30px;
}

.input-group-text{

    background:#0d6efd;
    color:white;

    border:none;

    width:50px;
    justify-content:center;
}

.form-control,
.form-select{

    height:52px;

    border:1px solid #ced4da;
}

.form-control:focus,
.form-select:focus{

    border-color:#0d6efd;

    box-shadow:
    0 0 0 0.25rem rgba(13,110,253,.15);
}

.btn-login{

    background:#0d6efd;

    color:white;

    font-weight:600;

    border:none;

    height:52px;

    border-radius:12px;

    transition:.3s;
}

.btn-login:hover{

    background:#0046a3;

    transform:translateY(-2px);

    color:white;
}





.footer-text{

    margin-top:25px;

    text-align:center;

    color:#6c757d;

    font-size:0.85rem;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Tablet */

@media(max-width:768px){

    .login-card{
        padding:35px;
    }

    .ulises-img{
        width:120px;
        height:120px;
    }
}

/* Celular */

@media(max-width:576px){

    .login-card{
        padding:25px;
    }

    .ulises-img{
        width:100px;
        height:100px;
    }

    .titulo{
        font-size:1.7rem;
    }

    .subtitulo{
        font-size:0.9rem;
    }
}

</style>

</head>
<body>

<div class="login-container">

    <div class="login-card">

        <div class="text-center">

            <img src="{{ url_for('static', filename='ulises.png') }}"
                 class="ulises-img"
                 onerror="this.style.display='none'">

            <h2 class="titulo">
                Cafetería ULagos
            </h2>

            <p class="subtitulo">
                Sistema de pedidos y compras online
            </p>

        </div>

        <!-- Mensajes flash (errores de login, etc.) -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2 mb-3 text-center" role="alert">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">

            <div class="input-group mb-3">

                <span class="input-group-text">
                    <i class="fa-solid fa-id-card"></i>
                </span>

                <input
                    type="text"
                    name="rut"
                    class="form-control"
                    placeholder="Ingrese su RUT"
                    required>

            </div>

            <div class="input-group mb-3">

                <span class="input-group-text">
                    <i class="fa-solid fa-lock"></i>
                </span>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Ingrese su contraseña"
                    required>

            </div>

            <div class="mb-4"></div>

            <button type="submit" class="btn btn-login w-100">

                <i class="fa-solid fa-right-to-bracket me-2"></i>

                Iniciar Sesión

            </button>

        </form>

   

        <div class="footer-text">

            Universidad de Los Lagos © 2026<br>
            Cafetería Online Campus Puerto Montt

        </div>

    </div>

</div>

</body>
</html>
